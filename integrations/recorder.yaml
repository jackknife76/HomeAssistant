recorder:
  purge_keep_days: 5
  exclude:
     domains:
       - device_tracker
       - media_player
       - uptime
       - time_date
       - worldclock
     entity_globs:
       - sensor.clock*
       - sensor.date*
       - sensor.glances*
       - sensor.load_*m
       - sensor.time*
       - sensor.uptime*
     entities:
       - camera.front_door
       - sensor.home_assistant_v2_db
       - sensor.memory_free
       - sensor.memory_use
       - sensor.memory_use_percent
       - weather.openweathermap