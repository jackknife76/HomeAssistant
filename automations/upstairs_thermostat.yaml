- id: hysteresis_upstairs_cool_on
  alias: Upstairs Cooling Hysteresis On
  trigger:
    - platform: template
      value_template: "{{ state_attr('climate.upstairs_thermostat', 'current_temperature') | float > state_attr('climate.upstairs_thermostat', 'target_temperature') | float + 2 }}"
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.upstairs_thermostat
          state: 'cool'
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.upstairs_thermostat
      data:
        hvac_mode: cool
- id: hysteresis_upstairs_cool_off
  alias: Upstairs Cooling Hysteresis Off
  trigger:
    - platform: template
      value_template: "{{ state_attr('climate.upstairs_thermostat', 'current_temperature') | float < state_attr('climate.upstairs_thermostat', 'target_temperature') | float }}"
  condition:
    - condition: state
      entity_id: climate.upstairs_thermostat
      state: 'cool'
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.upstairs_thermostat