- id: '1652213596308'
  alias: Downstairs 8pm
  description: ''
  use_blueprint:
    path: homeassistant/thermostat.yaml
    input:
      set_time: '20:01:00'
      thermostat_selection: climate.downstairs_thermostat
      below_65_cool: 74
      65_80_cool: 74
      80_95_cool: 74
      above_95_cool: 74
      above_95_heat: 66
      80_95_heat: 69
      below_65_heat: 69
- id: '1652213689910'
  alias: Downstairs Thermostat 8am
  description: ''
  use_blueprint:
    path: homeassistant/thermostat.yaml
    input:
      set_time: 08:00:00
      thermostat_selection: climate.downstairs_thermostat
      below_65_heat: 73
      below_65_cool: 78
      65_80_heat: 71
      65_80_cool: 76
      80_95_heat: 70
      80_95_cool: 76
      above_95_cool: 76
      above_95_heat: 71
- id: hysteresis_downstairs_cool_on
  alias: Downstairs Cooling Hysteresis On
  trigger:
    - platform: template
      value_template: "{{ state_attr('climate.downstairs_thermostat', 'current_temperature') | float > state_attr('climate.downstairs_thermostat', 'target_temperature') | float + 2 }}"
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.downstairs_thermostat
          state: 'cool'
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.downstairs_thermostat
      data:
        hvac_mode: cool
- id: hysteresis_downstairs_cool_off
  alias: Downstairs Cooling Hysteresis Off
  trigger:
    - platform: template
      value_template: "{{ state_attr('climate.downstairs_thermostat', 'current_temperature') | float < state_attr('climate.downstairs_thermostat', 'target_temperature') | float }}"
  condition:
    - condition: state
      entity_id: climate.downstairs_thermostat
      state: 'cool'
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.downstairs_thermostat