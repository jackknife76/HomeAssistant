title: Floorplan
views:
  - title: Floorplan
    path: floorplan
    panel: true            # still full‑screen
    icon: mdi:floor-plan

    # ONE CARD ONLY
    card:
      type: picture-elements

      # -----------------------------------------------------------------
      # Background image – switches automatically with the floor selector
      # -----------------------------------------------------------------
      image: >
        {% if states('input_select.floorplan_floor') == '1st Floor' %}
          /local/images/floorplan/downstairs_lights_on.png
        {% else %}
          /local/images/floorplan/upstairs_lights_on.png
        {% endif %}

      # -----------------------------------------------------------------
      # Elements – visible on both floors; some are shown/hidden by
      # a simple `state` condition inside the element definition.
      # -----------------------------------------------------------------
      elements:

        # ==== Master bedroom dimmer (appears on both floors) ====
        - entity: light.master_bedroom_dimmer
          type: image
          image: /local/images/floorplan/transparent_square.png
          style:
            left: 65%
            top: 48%
          tap_action:
            action: toggle

        # ==== Front porch switch (downstairs only) ====
        - entity: switch.front_porch
          type: image
          image: /local/images/floorplan/transparent_square.png
          style:
            left: 82%
            top: 63%
          tap_action:
            action: toggle
          state:
            - operator: '=='
              value: '1st Floor'   # show only on first floor

        # ==== Office light (downstairs only) ====
        - entity: light.office_light
          type: image
          image: /local/images/floorplan/transparent_square.png
          style:
            left: 95%
            top: 90%
          tap_action:
            action: toggle
          state:
            - operator: '=='
              value: '1st Floor'

        # ==== Basement light (downstairs only) ====
        - entity: light.basement_light
          type: image
          image: /local/images/floorplan/transparent_square.png
          style:
            left: 41.5%
            top: 61%
          tap_action:
            action: toggle
          state:
            - operator: '=='
              value: '1st Floor'

        # ==== Car tracker (downstairs only) ====
        - entity: device_tracker.toms_car_location_tracker
          type: state-icon
          style:
            left: 20.5%
            top: 18.5%
            '--iron-icon-stroke-color': '#969696'
            background-color: rgba(255,255,255,0.3)
            border-radius: 50%
            text-align: center
          state:
            - operator: '=='
              value: '1st Floor'

        # ==== Car charger sensor (downstairs only) ====
        - entity: binary_sensor.toms_car_charger_sensor
          type: state-icon
          state:
            'on': mdi:ev-station
            'off': /local/images/floorplan/transparent_square.png
          style:
            left: 20.5%
            top: 18.5%
            '--iron-icon-stroke-color': '#969696'
            background-color: rgba(255,255,255,0.3)
            border-radius: 50%
            text-align: center

        # ==== Battery label (downstairs only) ====
        - entity: sensor.toms_car_battery_sensor
          type: state-label
          prefix: 'Charge '
          style:
            left: 20%
            top: 10%
            font-size: 11px
            font-weight: bold
            background-color: rgba(255,255,255,0.3)
            border-radius: 10%
            color: '#000'
            text-align: center

        # ==== Outside temperature (both floors) ====
        - entity: weather.home
          attribute: temperature
          type: state-label
          prefix: 'Outside Temp '
          suffix: '℉'
          style:
            left: 84.5%
            top: 15%
            font-size: 11px
            font-weight: bold
            background-color: rgba(255,255,255,0.3)
            border-radius: 10%
            color: '#000'
            text-align: center

        # ==== Speedtest values (both floors) ====
        - entity: sensor.speedtest_ping
          type: state-label
          prefix: 'ping '
          style:
            left: 84.5%
            top: 70%
            font-size: 11px
            font-weight: bold
            background-color: rgba(255,255,255,0.3)
            border-radius: 10%
            color: '#000'
            text-align: center
        - entity: sensor.speedtest_download
          type: state-label
          prefix: 'Dnld '
          style:
            left: 84.5%
            top: 75%
            font-size: 11px
            font-weight: bold
            background-color: rgba(255,255,255,0.3)
            border-radius: 10%
            color: '#000'
            text-align: center
        - entity: sensor.speedtest_upload
          type: state-label
          prefix: 'Upld '
          style:
            left: 84.5%
            top: 80%
            font-size: 11px
            font-weight: bold
            background-color: rgba(255,255,255,0.3)
            border-radius: 10%
            color: '#000'
            text-align: center

        # ==== Floor‑switch button (always visible) ====
        - service: input_select.select_next
          service_data:
            entity_id: input_select.floorplan_floor
          type: service-button
          title: |
            {% if states('input_select.floorplan_floor') == '1st Floor' %}
              2nd Floor
            {% else %}
              1st Floor
            {% endif %}
          style:
            left: 5%
            top: 15%
            background: '#eaeaea'
            border-radius: 5%
